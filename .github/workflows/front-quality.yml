name: Front quality

on:
  pull_request:
    paths:
      - "front/**"
      - ".github/workflows/front-quality.yml"
  push:
    branches: [main]
    paths:
      - "front/**"
      - ".github/workflows/front-quality.yml"

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: front/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint, typecheck and unit tests
        run: npm run check

      - name: Production build
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: front/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      # Le serveur démarre en mode démo (aucune variable Supabase) : les parcours
      # s'exécutent sans compte ni base de données (cf. playwright.config.ts).
      - name: Run E2E tests
        run: npm run test:e2e
